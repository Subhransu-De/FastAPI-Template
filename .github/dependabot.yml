version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "daily"
    rebase-strategy: "auto"
    open-pull-requests-limit: 5
    reviewers:
      - "Subhransu-De"
    assignees:
      - "Subhransu-De"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "python"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    rebase-strategy: "auto"
    open-pull-requests-limit: 5
    reviewers:
      - "Subhransu-De"
    assignees:
      - "Subhransu-De"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "daily"
    rebase-strategy: "auto"
    open-pull-requests-limit: 5
    reviewers:
      - "Subhransu-De"
    assignees:
      - "Subhransu-De"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    rebase-strategy: "auto"
    open-pull-requests-limit: 5
    reviewers:
      - "Subhransu-De"
    assignees:
      - "Subhransu-De"
