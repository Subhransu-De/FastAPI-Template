name: CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "**.py"
      - "**.ini"
      - "**.toml"
      - "**.lock"
      - ".importlinter"
      - "Dockerfile"
      - "Makefile"
      - "docker-compose*.yml"
      - ".docker/**"
      - "scenario-tests/**"
      - "renovate.json"
      - "sonar-project.properties"
      - ".sonarcloud.properties"
      - ".github/dependabot.yml"
      - ".github/workflows/**.yml"
  pull_request:
    branches:
      - main
    paths:
      - "**.py"
      - "**.ini"
      - "**.toml"
      - "**.lock"
      - ".importlinter"
      - "Dockerfile"
      - "Makefile"
      - "docker-compose*.yml"
      - ".docker/**"
      - "scenario-tests/**"
      - "renovate.json"
      - "sonar-project.properties"
      - ".sonarcloud.properties"
      - ".github/dependabot.yml"
      - ".github/workflows/**.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Install lint dependencies
        run: uv sync --group lint --all-packages

      - name: Run Ruff
        run: make lint-ruff

  ty:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Install lint and test dependencies
        run: uv sync --group lint --group test --all-packages

      - name: Run Ty
        run: make lint-ty

  import-linter:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Install lint dependencies
        run: uv sync --group lint --all-packages

      - name: Run Import Linter
        run: make lint-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --group test

      - name: Run unit tests
        run: uv run --python ${{ matrix.python-version }} --group test pytest -m unit

      - name: Run integration tests
        run: uv run --python ${{ matrix.python-version }} --group test pytest -m integration

      - name: Run tests with coverage
        run: uv run --python ${{ matrix.python-version }} pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  build:
    runs-on: ubuntu-latest
    needs: [ruff, ty, import-linter, test]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: Scenario tests
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    env:
      TARGET_BASE_URL: http://localhost
      COMPOSE_FILE: docker-compose.yml:docker-compose.e2e.yml
      TOKEN_URL: http://localhost:8080/realms/fastapi-e2e-realm/protocol/openid-connect/token
      POSTGRES_PASSWORD: postgres
      KEYCLOAK_ADMIN_PASSWORD: admin
      OIDC_CLIENT_ID: fastapi-client
      OIDC_CLIENT_SECRET: change-me
      E2E_USERNAME: e2e-user
      E2E_PASSWORD: test-password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78

      - name: Install Python
        run: uv python install

      - name: Start Docker Compose stack
        run: docker compose up --build --wait --wait-timeout 240

      - name: Install Scenario Tests dependencies
        run: uv sync --package scenario-tests

      - name: Run scenario tests
        working-directory: scenario-tests
        run: uv run behave

      - name: Show Docker Compose logs
        if: failure()
        run: docker compose logs

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down --volumes --remove-orphans
