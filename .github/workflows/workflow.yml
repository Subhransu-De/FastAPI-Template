name: CI/CD

on:
  push:
    branches:
      - "**"
    paths:
      - "**.py"
      - "**.ini"
      - "**.toml"
      - "**.lock"
      - "Dockerfile"
      - "docker-compose*.yml"
      - ".docker/**"
      - "renovate.json"
      - "sonar-project.properties"
      - ".sonarcloud.properties"
      - ".github/dependabot.yml"
      - ".github/workflows/**.yml"
  pull_request:
    branches:
      - main
    paths:
      - "**.py"
      - "**.ini"
      - "**.toml"
      - "**.lock"
      - "Dockerfile"
      - "docker-compose*.yml"
      - ".docker/**"
      - "renovate.json"
      - "sonar-project.properties"
      - ".sonarcloud.properties"
      - ".github/dependabot.yml"
      - ".github/workflows/**.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Install lint dependencies
        run: uv sync --group lint

      - name: Run Ruff
        run: uv run ruff check .

  ty:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Install lint and test dependencies
        run: uv sync --group lint --group test

      - name: Run Ty
        run: uv run ty check

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --group test

      - name: Run unit tests
        run: uv run --python ${{ matrix.python-version }} --group test pytest -m unit

      - name: Run integration tests
        run: uv run --python ${{ matrix.python-version }} --group test pytest -m integration

      - name: Run tests with coverage
        run: uv run --python ${{ matrix.python-version }} pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  build:
    runs-on: ubuntu-latest
    needs: [ruff, ty, test]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    env:
      BASE_URL: http://localhost
      COMPOSE_FILE: docker-compose.yml:docker-compose.e2e.yml
      KEYCLOAK_TOKEN_URL: http://localhost:8080/realms/fastapi-e2e-realm/protocol/openid-connect/token
      POSTGRES_PASSWORD: postgres
      KEYCLOAK_ADMIN_PASSWORD: admin
      OIDC_CLIENT_ID: fastapi-client
      OIDC_CLIENT_SECRET: change-me
      E2E_USERNAME: e2e-user
      E2E_PASSWORD: test-password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Start Docker Compose stack
        run: docker compose up --build --wait --wait-timeout 240

      - name: Run API E2E flow
        run: |
          set -euo pipefail

          for attempt in {1..30}; do
            if curl -fsS "${BASE_URL}/health/db"; then
              break
            fi

            if [ "${attempt}" -eq 30 ]; then
              echo "FastAPI health endpoint did not become ready"
              exit 1
            fi

            sleep 2
          done

          token_response="$(
            curl -fsS -X POST "${KEYCLOAK_TOKEN_URL}" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "grant_type=password" \
              --data-urlencode "client_id=${OIDC_CLIENT_ID}" \
              --data-urlencode "client_secret=${OIDC_CLIENT_SECRET}" \
              --data-urlencode "username=${E2E_USERNAME}" \
              --data-urlencode "password=${E2E_PASSWORD}"
          )"
          access_token="$(jq -r ".access_token" <<< "${token_response}")"

          if [ -z "${access_token}" ] || [ "${access_token}" = "null" ]; then
            echo "Keycloak did not return an access token"
            exit 1
          fi

          create_response="$(
            curl -fsS -X POST "${BASE_URL}/entities/" \
              -H "Authorization: Bearer ${access_token}" \
              -H "Content-Type: application/json" \
              -d '{"name":"E2E entity","description":"Created by CI E2E"}'
          )"
          entity_id="$(jq -r ".id" <<< "${create_response}")"
          created_name="$(jq -r ".name" <<< "${create_response}")"
          created_description="$(jq -r ".description" <<< "${create_response}")"

          if [ -z "${entity_id}" ] || [ "${entity_id}" = "null" ]; then
            echo "Create entity response did not include an id"
            exit 1
          fi

          if [ "${created_name}" != "E2E entity" ] || [ "${created_description}" != "Created by CI E2E" ]; then
            echo "Create entity response did not match the request payload"
            exit 1
          fi

          get_response="$(
            curl -fsS "${BASE_URL}/entities/${entity_id}" \
              -H "Authorization: Bearer ${access_token}"
          )"
          if [ "$(jq -r ".id" <<< "${get_response}")" != "${entity_id}" ]; then
            echo "Get entity response returned the wrong entity"
            exit 1
          fi

          list_response="$(
            curl -fsS "${BASE_URL}/entities/" \
              -H "Authorization: Bearer ${access_token}"
          )"
          if ! jq -e --arg entity_id "${entity_id}" 'any(.[]; .id == $entity_id)' <<< "${list_response}" > /dev/null; then
            echo "List entities response did not include the created entity"
            exit 1
          fi

          update_response="$(
            curl -fsS -X PUT "${BASE_URL}/entities/${entity_id}" \
              -H "Authorization: Bearer ${access_token}" \
              -H "Content-Type: application/json" \
              -d '{"name":"Updated E2E entity","description":null}'
          )"
          updated_name="$(jq -r ".name" <<< "${update_response}")"
          updated_description="$(jq -r ".description" <<< "${update_response}")"

          if [ "${updated_name}" != "Updated E2E entity" ] || [ "${updated_description}" != "null" ]; then
            echo "Update entity response did not match the request payload"
            exit 1
          fi

          delete_status="$(
            curl -fsS -o /dev/null -w "%{http_code}" -X DELETE "${BASE_URL}/entities/${entity_id}" \
              -H "Authorization: Bearer ${access_token}"
          )"
          if [ "${delete_status}" != "204" ]; then
            echo "Delete entity returned ${delete_status}, expected 204"
            exit 1
          fi

          missing_status="$(
            curl -sS -o /dev/null -w "%{http_code}" "${BASE_URL}/entities/${entity_id}" \
              -H "Authorization: Bearer ${access_token}"
          )"
          if [ "${missing_status}" != "404" ]; then
            echo "Deleted entity lookup returned ${missing_status}, expected 404"
            exit 1
          fi

      - name: Show Docker Compose logs
        if: failure()
        run: docker compose logs

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down --volumes --remove-orphans
