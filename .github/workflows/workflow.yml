name: CI/CD

on:
  push:
    branches:
      - "**"
    paths:
      - "**.py"
      - "**.ini"
      - "**.toml"
      - "**.lock"
      - "Dockerfile"
      - "docker-compose.yml"
      - "renovate.json"
      - "sonar-project.properties"
      - ".sonarcloud.properties"
      - ".github/dependabot.yml"
      - ".github/workflows/**.yml"
  pull_request:
    branches:
      - main
    paths:
      - "**.py"
      - "**.ini"
      - "**.toml"
      - "**.lock"
      - "Dockerfile"
      - "docker-compose.yml"
      - "renovate.json"
      - "sonar-project.properties"
      - ".sonarcloud.properties"
      - ".github/dependabot.yml"
      - ".github/workflows/**.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v5

      - name: Install lint dependencies
        run: uv sync --group lint

      - name: Run Ruff
        run: uv run ruff check .

  ty:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v5

      - name: Install lint and test dependencies
        run: uv sync --group lint --group test

      - name: Run Ty
        run: uv run ty check

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v5

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --group test

      - name: Run unit tests
        run: uv run --python ${{ matrix.python-version }} --group test pytest -m unit

      - name: Run integration tests
        run: uv run --python ${{ matrix.python-version }} --group test pytest -m integration

      - name: Run tests with coverage
        run: uv run --python ${{ matrix.python-version }} pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  build:
    runs-on: ubuntu-latest
    needs: [ruff, ty, test]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
