services:
  db:
    container_name: postgres
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: fastapi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - fastapi_template_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_URL: http://localhost:8080
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./.docker/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3 && cat <&3 | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  app:
    container_name: template-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      APP_HOST: 0.0.0.0
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/fastapi_db
      OIDC_ISSUER_URL: http://127.0.0.1:8080/realms/fastapi-realm
      OIDC_INTERNAL_URL: http://keycloak:8080/realms/fastapi-realm
      OIDC_CLIENT_ID: fastapi-client
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?OIDC_CLIENT_SECRET is required}
      OIDC_JWKS_CACHE_TTL_SECONDS: 300
      OIDC_JWKS_URI: http://keycloak:8080/realms/fastapi-realm/protocol/openid-connect/certs
      OIDC_ISSUER: http://127.0.0.1:8080/realms/fastapi-realm
      OIDC_AUTHORIZATION_ENDPOINT: http://127.0.0.1:8080/realms/fastapi-realm/protocol/openid-connect/auth
      OIDC_TOKEN_ENDPOINT: http://127.0.0.1:8080/realms/fastapi-realm/protocol/openid-connect/token
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: unless-stopped

volumes:
  fastapi_template_postgres_data:
